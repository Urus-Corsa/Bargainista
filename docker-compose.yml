services:

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app/app       # live code mount — uvicorn --reload picks up changes instantly
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://bargainista:bargainista@postgres:5432/bargainista
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false      # API keys live here; stack still starts without them

  worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=info
    volumes:
      - ./app:/app/app
    environment:
      DATABASE_URL: postgresql+asyncpg://bargainista:bargainista@postgres:5432/bargainista
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bargainista
      POSTGRES_PASSWORD: bargainista
      POSTGRES_DB: bargainista
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bargainista"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
