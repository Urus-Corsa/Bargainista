services:

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://bargainista:bargainista@postgres:5432/bargainista
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+asyncpg://bargainista:bargainista@postgres:5432/bargainista
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MCP_SERVER_URL: http://mcp:8001
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      mcp:
        condition: service_healthy
    env_file:
      - path: .env
        required: false      # API keys live here; stack still starts without them

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: python -m app.mcp.vehicle_data
    environment:
      REDIS_URL: redis://redis:6379/0
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    env_file:
      - path: .env
        required: false

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://bargainista:bargainista@postgres:5432/bargainista
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MCP_SERVER_URL: http://mcp:8001
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      mcp:
        condition: service_healthy
    env_file:
      - path: .env
        required: false

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bargainista
      POSTGRES_PASSWORD: bargainista
      POSTGRES_DB: bargainista
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bargainista"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
