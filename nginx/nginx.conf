upstream api {
    server api:8000;
}

server {
    listen 80;
    server_name bargainista.io www.bargainista.io _;

    location / {
        proxy_pass         http://api;
        proxy_http_version 1.1;

        # Required for WebSocket upgrade negotiation (/ws/analyze/{run_id}).
        # Without these headers FastAPI returns 400 on the upgrade handshake.
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # LLM agent calls can take 60-90s; default 60s timeout would cut them off.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
